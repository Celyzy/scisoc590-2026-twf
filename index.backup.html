<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Talent &amp; Workforce · Stakeholder Redteaming Dashboard</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f4f5f7;
  color: #1a1a2e;
  min-height: 100vh;
}

/* ── HEADER ─────────────────────────────────────────── */
#header {
  position: sticky; top: 0; z-index: 100;
  background: #fff; border-bottom: 1px solid #e5e7eb;
  padding: 11px 28px;
  display: flex; align-items: center; justify-content: space-between; gap: 24px;
}
.eyebrow {
  font-size: 10.5px; color: #185FA5; letter-spacing: 0.1em;
  text-transform: uppercase; font-weight: 600; margin-bottom: 2px;
}
.hdr-title { font-size: 17px; font-weight: 700; color: #111827; line-height: 1.25; }
.hdr-sub   { font-size: 11.5px; color: #6b7280; margin-top: 2px; line-height: 1.4; }
.produced  { text-align: right; flex-shrink: 0; }
.prod-lbl  { font-size: 10.5px; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 2px; }
.prod-names { font-size: 12px; color: #374151; font-weight: 500; }

/* ── TABS ────────────────────────────────────────────── */
#tabs-bar {
  background: #fff; border-bottom: 1px solid #e5e7eb;
  padding: 10px 28px; display: flex; gap: 6px; flex-wrap: wrap;
}
.tab-pill {
  padding: 5px 14px; border-radius: 20px; font-size: 12.5px; font-weight: 500;
  cursor: pointer; border: 1px solid #e5e7eb; background: #fff; color: #374151;
  transition: background 0.12s, border-color 0.12s, color 0.12s;
  white-space: nowrap; line-height: 1.55;
}
.tab-pill:hover:not(.active) { background: #f3f4f6; border-color: #d1d5db; }
.tab-pill.active { background: #185FA5; border-color: #185FA5; color: #fff; }

/* ── FILTER ──────────────────────────────────────────── */
#filter-bar {
  padding: 9px 28px; display: flex; align-items: center; gap: 6px;
  border-bottom: 1px solid #ebebeb; background: #fafafa;
}
.filter-label { font-size: 12px; color: #9ca3af; margin-right: 2px; }
.filter-btn {
  padding: 3px 11px; border-radius: 14px; font-size: 12px; font-weight: 500;
  cursor: pointer; border: 1px solid #e5e7eb; background: #fff; color: #374151;
  transition: background 0.12s, border-color 0.12s, color 0.12s;
}
.filter-btn:hover:not(.active) { background: #f3f4f6; }
.filter-btn[data-stance="all"].active     { background: #185FA5; border-color: #185FA5; color: #fff; }
.filter-btn[data-stance="against"].active { background: #E24B4A; border-color: #E24B4A; color: #fff; }
.filter-btn[data-stance="neutral"].active { background: #BA7517; border-color: #BA7517; color: #fff; }
.filter-btn[data-stance="pro"].active     { background: #639922; border-color: #639922; color: #fff; }

/* ── CONTEXT BLURB ───────────────────────────────────── */
#context-blurb {
  margin: 14px 28px 12px;
  padding: 9px 14px;
  border-left: 3px solid #185FA5;
  background: #f0f7ff;
  border-radius: 0 6px 6px 0;
  font-size: 13px; color: #374151; line-height: 1.55;
}

/* ── MAIN LAYOUT ─────────────────────────────────────── */
#main {
  display: flex; gap: 0;
  padding: 0 28px 52px;
  align-items: flex-start;
}

/* ── CARD LIST ───────────────────────────────────────── */
#card-list {
  width: 340px; flex-shrink: 0;
  display: flex; flex-direction: column; gap: 10px;
}

.scard {
  background: #fff; border: 1px solid #e5e7eb; border-radius: 10px;
  padding: 13px 15px; cursor: pointer;
  transition: border-color 0.13s;
}
.scard:hover         { border-color: #93b8e3; }
.scard.selected      { border-color: #185FA5; box-shadow: 0 0 0 2.5px rgba(24,95,165,0.13); }

.card-r1 { display: flex; align-items: center; gap: 7px; margin-bottom: 8px; }
.sdot    { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.sdot-against { background: #E24B4A; }
.sdot-neutral { background: #BA7517; }
.sdot-pro     { background: #639922; }

.sname { font-size: 13.5px; font-weight: 600; color: #111827; flex: 1; min-width: 0; }

.sbadge {
  flex-shrink: 0; font-size: 11px; font-weight: 600;
  padding: 2px 8px; border-radius: 10px; text-transform: capitalize; letter-spacing: 0.01em;
}
.sbadge-against { background: #FCEBEB; color: #A32D2D; }
.sbadge-neutral { background: #FAEEDA; color: #854F0B; }
.sbadge-pro     { background: #EAF3DE; color: #3B6D11; }

.card-r2 { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
.int-lbl { font-size: 11px; color: #9ca3af; white-space: nowrap; }

.bar-wrap {
  width: 160px; flex-shrink: 0;
  height: 5px; background: #eef0f2; border-radius: 3px; overflow: hidden;
}
.bar-fill { height: 100%; border-radius: 3px; }
.bar-against { background: #E24B4A; }
.bar-neutral { background: #BA7517; }
.bar-pro     { background: #639922; }

.int-score { font-size: 12px; font-weight: 600; color: #374151; white-space: nowrap; }
.card-r3   { font-size: 12px; color: #6b7280; line-height: 1.45; }

/* ── DETAIL PANEL ────────────────────────────────────── */
#detail-panel {
  flex-shrink: 0; width: 0; overflow: hidden;
  transition: width 0.22s cubic-bezier(.4,0,.2,1),
              margin-left 0.22s cubic-bezier(.4,0,.2,1);
  margin-left: 0;
}
#detail-panel.open { width: 320px; margin-left: 16px; }

#detail-inner {
  width: 320px; background: #fff; border: 1px solid #e5e7eb;
  border-radius: 10px; padding: 16px 18px 22px;
}

.dp-hdr { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 14px; }
.dp-title-blk { flex: 1; }
.dp-name { font-size: 15px; font-weight: 700; color: #111827; margin-bottom: 5px; }
.dp-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.dp-score { font-size: 12px; color: #6b7280; font-weight: 500; }
.dp-close {
  flex-shrink: 0; background: none; border: none; cursor: pointer;
  color: #9ca3af; font-size: 21px; line-height: 1; padding: 0; margin-top: -3px;
}
.dp-close:hover { color: #374151; }

.dp-sec { margin-bottom: 13px; }
.dp-sec:last-child { margin-bottom: 0; }
.dp-sec-lbl {
  font-size: 10.5px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.09em; color: #9ca3af;
  padding-bottom: 5px; border-bottom: 1px solid #f0f0f0; margin-bottom: 8px;
}
.dp-sec-body { font-size: 12.5px; color: #374151; line-height: 1.65; }

/* ── OVERVIEW SECTION ────────────────────────────────── */
#overview-section { flex: 1; min-width: 0; display: none; }

.ov-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(252px, 1fr));
  gap: 12px;
}
.ov-card {
  background: #fff; border: 1px solid #e5e7eb;
  border-radius: 10px; padding: 13px 15px;
}
.ov-hdr { display: flex; align-items: center; gap: 7px; margin-bottom: 9px; }
.ov-name { font-size: 13px; font-weight: 600; color: #111827; flex: 1; }
.ov-int-row { display: flex; align-items: center; gap: 8px; margin-bottom: 9px; }
.ov-chips { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 9px; }
.rec-chip {
  font-size: 10.5px; padding: 2px 7px; border-radius: 8px;
  background: #f0f6ff; color: #185FA5; font-weight: 500; border: 1px solid #d1e3f8;
}
.nn-lbl {
  font-size: 10.5px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.08em; color: #9ca3af; margin-bottom: 5px;
}
.nn-list { list-style: none; }
.nn-list li {
  font-size: 12px; color: #374151; padding-left: 13px;
  position: relative; line-height: 1.5; margin-bottom: 2px;
}
.nn-list li::before { content: '—'; position: absolute; left: 0; color: #c4c9d0; }

.empty-msg { padding: 36px 0; text-align: center; color: #9ca3af; font-size: 13px; }
</style>
</head>
<body>

<!-- HEADER -->
<header id="header">
  <div id="header-left">
    <div class="eyebrow">SCISOC 590 Talent &amp; Workforce Team</div>
    <div class="hdr-title">Stakeholder Redteaming Dashboard</div>
    <div class="hdr-sub">Anticipating concerns, grievances, and engagement strategies across policy recommendations</div>
  </div>
  <div class="produced">
    <div class="prod-lbl">Produced by</div>
    <div class="prod-names">Celine Yang &middot; Jon Crucitti &middot; Angie Feng &middot; Victoria Lanier</div>
    <div class="prod-names" style="margin-top:2px;">Visualization by Celine Yang</div>
  </div>
</header>

<!-- TABS -->
<div id="tabs-bar"></div>

<!-- FILTER -->
<div id="filter-bar">
  <span class="filter-label">Stance</span>
  <button class="filter-btn" data-stance="all">All</button>
  <button class="filter-btn" data-stance="against">Against</button>
  <button class="filter-btn" data-stance="neutral">Neutral</button>
  <button class="filter-btn" data-stance="pro">Pro</button>
</div>

<!-- CONTEXT BLURB -->
<div id="context-blurb"></div>

<!-- MAIN -->
<div id="main">
  <div id="card-list"></div>
  <div id="detail-panel"><div id="detail-inner"></div></div>
  <div id="overview-section"></div>
</div>

<script>
/* ── DATA ──────────────────────────────────────────────── */
const recs = [
  { id:'r1', label:'Community upskilling',      context:'Programs to reskill adults and displaced workers through community-based training initiatives.' },
  { id:'r2', label:'PK\u201313 education',       context:'Integrating AI literacy and workforce preparation into public school curricula.' },
  { id:'r3', label:'Credentialling',             context:'Creating state-recognized micro-credentials and stackable certifications for AI-adjacent skills.' },
  { id:'r4', label:'Pipeline to workforce',      context:'Building structured pathways from education institutions directly into AI-sector employment.' },
  { id:'r5', label:'UE & reemployment',          context:'Reforming unemployment insurance and reemployment services for AI-displaced workers.' },
  { id:'r6', label:'Private sector partnership', context:'Formalizing collaboration between the state and private employers to align training with hiring needs.' },
];

const stakeholders = {
  r1:[
    { name:'Displaced workers',    stance:'against', intensity:92,
      oneliner:'Fear retraining programs favor younger cohorts and leave them behind.',
      cares:'Job security, dignity of work, and financial stability for their families.',
      grievance:'Community upskilling programs historically exclude workers over 45 due to program design assumptions and rigid scheduling that ignores shift-work realities.',
      engage:'Guarantee flexible scheduling and evening cohorts. Provide income support during training periods. Co-design programs with labor unions to build trust.' },
    { name:'Rural county leaders', stance:'neutral', intensity:68,
      oneliner:'Skeptical about whether resources will reach rural areas equitably.',
      cares:'Geographic equity, local economic development, and constituent trust in state programs.',
      grievance:'Past workforce initiatives concentrated funding and infrastructure in urban corridors, bypassing rural counties entirely.',
      engage:'Mandate geographic distribution requirements in program design. Create dedicated rural liaisons within the program office.' },
    { name:'Community colleges',   stance:'pro',     intensity:45,
      oneliner:'Poised to benefit but worry about funding continuity beyond initial grants.',
      cares:'Institutional funding stability, enrollment growth, and mission alignment with workforce needs.',
      grievance:'One-time grant structures create program dependency without sustainable revenue streams, making long-term planning impossible.',
      engage:'Build multi-year appropriations into policy design. Involve colleges as co-designers, not just service vendors.' },
  ],
  r2:[
    { name:'Teachers unions',  stance:'against', intensity:85,
      oneliner:'See AI tools as threats to teaching roles and professional autonomy.',
      cares:'Job security, working conditions, and respect for professional pedagogical expertise.',
      grievance:'AI tools are consistently framed as teacher replacements in public communications, rather than as administrative supports.',
      engage:'Involve union representatives in curriculum co-design from the start. Reframe AI as a tool that reduces administrative burden, not one that replaces instructional judgment.' },
    { name:'Parents (K\u201312)', stance:'neutral', intensity:78,
      oneliner:'Worried AI curriculum displaces foundational learning and lacks parental oversight.',
      cares:'Child safety online, academic fundamentals, and transparency from school administrators.',
      grievance:'No clear communication about how AI-generated content is vetted, or what student data is collected and by whom.',
      engage:'Publish plain-language parent guides before rollout. Default to opt-in rather than opt-out data policies for minors.' },
    { name:'EdTech vendors',   stance:'pro',     intensity:30,
      oneliner:'Strong advocates \u2014 see a large public procurement opportunity.',
      cares:'Market access, procurement speed, and regulatory clarity on product standards.',
      grievance:'Slow and opaque procurement cycles and unclear technical standards create costly market uncertainty.',
      engage:'Establish a vendor certification framework with clear criteria. Streamline procurement for pre-approved products.' },
  ],
  r3:[
    { name:'Traditional universities', stance:'against', intensity:80,
      oneliner:'New credentials may undercut degree value and erode enrollment.',
      cares:'Institutional prestige, tuition revenue, and accreditation standing.',
      grievance:'State-backed micro-credentials compete directly with degree programs without equivalent rigor or oversight requirements.',
      engage:'Involve universities in credential design committees. Create articulation agreements so credentials stack toward existing degree pathways.' },
    { name:'Low-income job seekers',   stance:'neutral', intensity:70,
      oneliner:'Skeptical that credentials will translate to real, quality job offers.',
      cares:'Actual employment outcomes, affordability of training, and employer recognition of certifications.',
      grievance:'Prior credential programs were not recognized by enough employers to justify the time and cost investment for people with no financial cushion.',
      engage:'Require signed employer commitment letters before certifying any new credential. Publish outcome data \u2014 wages, placement rates \u2014 transparently.' },
    { name:'Employers (tech sector)',  stance:'pro',     intensity:40,
      oneliner:'Want faster pathways to skilled hires without degree gatekeeping.',
      cares:'Talent supply quality, hiring speed, and alignment of skills to actual job requirements.',
      grievance:'Credential frameworks lag industry needs by 2\u20133 years due to slow bureaucratic update cycles disconnected from market signals.',
      engage:'Create employer advisory boards with real authority to update credential requirements on an annual basis.' },
  ],
  r4:[
    { name:'HBCUs',             stance:'pro',     intensity:60,
      oneliner:'Eager to participate but worried about equitable funding allocation.',
      cares:'Institutional capacity, student outcomes, and equitable access to state resources.',
      grievance:'Pipeline programs historically default to flagship research universities, systematically underfunding HBCUs despite strong and diverse graduate outcomes.',
      engage:'Set-aside funding allocations specifically for HBCUs. Create a dedicated HBCU liaison role within the program administration office.' },
    { name:'Staffing agencies', stance:'neutral', intensity:55,
      oneliner:'Uncertain how state pipeline programs affect their existing placement business.',
      cares:'Market position, client employer relationships, and access to talent pools.',
      grievance:'Government-run pipelines risk disintermediating agencies and disrupting established employer relationships without offering alternatives.',
      engage:'Define a formal partner role for staffing agencies within the pipeline. Position them as complementary, not competitive, to state programs.' },
  ],
  r5:[
    { name:'Unemployed workers (25\u201354)', stance:'against', intensity:95,
      oneliner:'UI benefit timelines too short; retraining programs too slow to complete in time.',
      cares:'Immediate financial relief and realistic, accessible pathways back to stable employment.',
      grievance:'Current unemployment insurance benefit windows expire before any meaningful retraining program can be completed, creating a cliff-edge for workers in transition.',
      engage:'Extend benefit eligibility automatically for workers enrolled in approved retraining programs. Develop a bridge payment to cover the gap period.' },
    { name:'NC Dept. of Commerce', stance:'neutral', intensity:50,
      oneliner:'Supportive in principle but wary of implementation complexity and administrative burden.',
      cares:'Administrative feasibility, federal compliance requirements, and measurable performance metrics.',
      grievance:'New programs consistently add compliance and reporting burden without providing commensurate staffing or systems upgrades to handle the load.',
      engage:'Fund implementation capacity alongside each program. Build shared data infrastructure to reduce duplicative reporting requirements.' },
  ],
  r6:[
    { name:'Labor advocates',      stance:'against', intensity:88,
      oneliner:'Worried partnerships cede too much structural power to private sector interests.',
      cares:'Worker rights, wage floors, and public accountability for state-endorsed programs.',
      grievance:'Private sector partnership programs historically prioritize employer preferences over worker protections, with no enforceable accountability mechanisms.',
      engage:'Require formal labor representation on all public-private advisory bodies. Include worker outcome metrics \u2014 wages, retention, benefits \u2014 as primary KPIs alongside employer satisfaction.' },
    { name:'Small businesses',     stance:'neutral', intensity:65,
      oneliner:'Want talent pipelines but cannot absorb the cost or risk of untested hires.',
      cares:'Reducing hiring risk, lowering onboarding costs, and accessing affordable AI tools for their own operations.',
      grievance:'Partnership program structures are designed for enterprise-scale participation, creating prohibitive compliance and administrative burdens for small businesses.',
      engage:'Create a tiered participation structure with reduced requirements for businesses under 50 employees. Offer wage subsidies for the first 90 days of placement.' },
    { name:'Large tech employers', stance:'pro',     intensity:35,
      oneliner:'Strongly supportive \u2014 eager to shape what \u201cworkforce-ready\u201d means in practice.',
      cares:'Talent pipeline quality, public relations positioning, and meaningful policy influence.',
      grievance:'Currently lack a formal, structured seat at the table to define skill requirements that programs train toward.',
      engage:'Establish a named private sector advisory council with rotating seats for top NC employers. Publish their recommendations publicly to ensure accountability.' },
  ],
};

/* ── STATE ─────────────────────────────────────────────── */
let activeTab    = 'r1';
let activeFilter = 'all';
let selected     = null;

/* ── HELPERS ───────────────────────────────────────────── */
function getNonneg(s) {
  return s.cares
    .replace(/\.$/, '')
    .replace(/ and /gi, ', ')
    .split(',')
    .map(x => x.trim())
    .filter(x => x.length > 4)
    .slice(0, 3);
}

function recLabel(id) {
  const r = recs.find(r => r.id === id);
  return r ? r.label : id;
}

function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

/* ── TABS ───────────────────────────────────────────────── */
function renderTabs() {
  const bar = document.getElementById('tabs-bar');
  bar.innerHTML = '';
  [...recs, { id:'overview', label:'Stakeholder overview' }].forEach(r => {
    const btn = document.createElement('button');
    btn.className = 'tab-pill' + (activeTab === r.id ? ' active' : '');
    btn.textContent = r.label;
    btn.onclick = () => { activeTab = r.id; selected = null; render(); };
    bar.appendChild(btn);
  });
}

/* ── FILTER ─────────────────────────────────────────────── */
function renderFilter() {
  const bar = document.getElementById('filter-bar');
  bar.style.display = activeTab === 'overview' ? 'none' : 'flex';
  bar.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.stance === activeFilter);
    btn.onclick = () => { activeFilter = btn.dataset.stance; selected = null; render(); };
  });
}

/* ── CONTEXT BLURB ──────────────────────────────────────── */
function renderContext() {
  const el = document.getElementById('context-blurb');
  if (activeTab === 'overview') { el.style.display = 'none'; return; }
  el.style.display = '';
  const rec = recs.find(r => r.id === activeTab);
  el.textContent = rec ? rec.context : '';
}

/* ── CARDS ──────────────────────────────────────────────── */
function renderCards() {
  const list   = document.getElementById('card-list');
  const panel  = document.getElementById('detail-panel');
  const ovSec  = document.getElementById('overview-section');

  if (activeTab === 'overview') {
    list.style.display  = 'none';
    panel.style.display = 'none';
    ovSec.style.display = 'block';
    renderOverview();
    return;
  }

  list.style.display  = 'flex';
  panel.style.display = '';
  ovSec.style.display = 'none';

  const items = (stakeholders[activeTab] || [])
    .filter(s => activeFilter === 'all' || s.stance === activeFilter)
    .sort((a, b) => b.intensity - a.intensity);

  list.innerHTML = '';
  if (!items.length) {
    list.innerHTML = '<div class="empty-msg">No stakeholders match this filter.</div>';
    return;
  }

  items.forEach(s => {
    const card = document.createElement('div');
    card.className = 'scard' + (selected?.name === s.name ? ' selected' : '');
    card.innerHTML = `
      <div class="card-r1">
        <span class="sdot sdot-${s.stance}"></span>
        <span class="sname">${esc(s.name)}</span>
        <span class="sbadge sbadge-${s.stance}">${s.stance}</span>
      </div>
      <div class="card-r2">
        <span class="int-lbl">Intensity</span>
        <div class="bar-wrap"><div class="bar-fill bar-${s.stance}" style="width:${s.intensity}%"></div></div>
        <span class="int-score">${s.intensity}/100</span>
      </div>
      <div class="card-r3">${esc(s.oneliner)}</div>`;
    card.onclick = () => { selected = s; render(); };
    list.appendChild(card);
  });
}

/* ── DETAIL PANEL ───────────────────────────────────────── */
function renderDetail() {
  const panel = document.getElementById('detail-panel');
  const inner = document.getElementById('detail-inner');

  if (!selected || activeTab === 'overview') {
    panel.classList.remove('open');
    return;
  }

  panel.classList.add('open');
  const s = selected;
  inner.innerHTML = `
    <div class="dp-hdr">
      <div class="dp-title-blk">
        <div class="dp-name">${esc(s.name)}</div>
        <div class="dp-meta">
          <span class="sbadge sbadge-${s.stance}">${s.stance}</span>
          <span class="dp-score">Intensity&nbsp;${s.intensity}/100</span>
        </div>
      </div>
      <button class="dp-close" id="dp-close-btn">&times;</button>
    </div>
    <div class="dp-sec">
      <div class="dp-sec-lbl">What they care about</div>
      <div class="dp-sec-body">${esc(s.cares)}</div>
    </div>
    <div class="dp-sec">
      <div class="dp-sec-lbl">Their grievance</div>
      <div class="dp-sec-body">${esc(s.grievance)}</div>
    </div>
    <div class="dp-sec">
      <div class="dp-sec-lbl">How to engage</div>
      <div class="dp-sec-body">${esc(s.engage)}</div>
    </div>`;

  document.getElementById('dp-close-btn').onclick = () => { selected = null; render(); };
}

/* ── OVERVIEW ───────────────────────────────────────────── */
function renderOverview() {
  const el  = document.getElementById('overview-section');
  const all = [];
  Object.entries(stakeholders).forEach(([recId, list]) => {
    list.forEach(s => all.push({ ...s, recId }));
  });
  all.sort((a, b) => b.intensity - a.intensity);

  el.innerHTML = '<div class="ov-grid">' + all.map(s => {
    const nn = getNonneg(s);
    return `
      <div class="ov-card">
        <div class="ov-hdr">
          <span class="sdot sdot-${s.stance}"></span>
          <span class="ov-name">${esc(s.name)}</span>
          <span class="sbadge sbadge-${s.stance}">${s.stance}</span>
        </div>
        <div class="ov-int-row">
          <div class="bar-wrap"><div class="bar-fill bar-${s.stance}" style="width:${s.intensity}%"></div></div>
          <span class="int-score">${s.intensity}/100</span>
        </div>
        <div class="ov-chips">
          <span class="rec-chip">${esc(recLabel(s.recId))}</span>
        </div>
        <div class="nn-lbl">Non-negotiables</div>
        <ul class="nn-list">${nn.map(n => `<li>${esc(n)}</li>`).join('')}</ul>
      </div>`;
  }).join('') + '</div>';
}

/* ── RENDER ALL ─────────────────────────────────────────── */
function render() {
  renderTabs();
  renderFilter();
  renderContext();
  renderCards();
  renderDetail();
}

render();
</script>
</body>
</html>
