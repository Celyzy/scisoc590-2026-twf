<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Talent &amp; Workforce · Stakeholder Redteaming Dashboard</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f4f5f7;
  color: #1a1a2e;
  min-height: 100vh;
}

/* ── HEADER ─────────────────────────────────────────── */
#header {
  position: sticky; top: 0; z-index: 100;
  background: #fff; border-bottom: 1px solid #e5e7eb;
  padding: 11px 28px;
  display: flex; align-items: center; justify-content: space-between; gap: 24px;
}
.eyebrow {
  font-size: 10.5px; color: #185FA5; letter-spacing: 0.1em;
  text-transform: uppercase; font-weight: 600; margin-bottom: 2px;
}
.hdr-title { font-size: 17px; font-weight: 700; color: #111827; line-height: 1.25; }
.hdr-sub   { font-size: 11.5px; color: #6b7280; margin-top: 2px; line-height: 1.4; }
.produced  { text-align: right; flex-shrink: 0; }
.prod-lbl  { font-size: 10.5px; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 2px; }
.prod-names { font-size: 12px; color: #374151; font-weight: 500; }

/* ── TABS ────────────────────────────────────────────── */
#tabs-bar {
  background: #fff; border-bottom: 1px solid #e5e7eb;
  padding: 10px 28px; display: flex; gap: 6px; flex-wrap: wrap;
}
.tab-pill {
  padding: 5px 14px; border-radius: 20px; font-size: 12.5px; font-weight: 500;
  cursor: pointer; border: 1px solid #e5e7eb; background: #fff; color: #374151;
  transition: background 0.12s, border-color 0.12s, color 0.12s;
  white-space: nowrap; line-height: 1.55;
}
.tab-pill:hover:not(.active) { background: #f3f4f6; border-color: #d1d5db; }
.tab-pill.active { background: #185FA5; border-color: #185FA5; color: #fff; }

/* ── FILTER ──────────────────────────────────────────── */
#filter-bar {
  padding: 9px 28px; display: flex; align-items: center; gap: 6px;
  border-bottom: 1px solid #ebebeb; background: #fafafa;
}
.filter-label { font-size: 12px; color: #9ca3af; margin-right: 2px; }
.filter-btn {
  padding: 3px 11px; border-radius: 14px; font-size: 12px; font-weight: 500;
  cursor: pointer; border: 1px solid #e5e7eb; background: #fff; color: #374151;
  transition: background 0.12s, border-color 0.12s, color 0.12s;
}
.filter-btn:hover:not(.active) { background: #f3f4f6; }
.filter-btn[data-stance="all"].active     { background: #185FA5; border-color: #185FA5; color: #fff; }
.filter-btn[data-stance="against"].active { background: #E24B4A; border-color: #E24B4A; color: #fff; }
.filter-btn[data-stance="neutral"].active { background: #BA7517; border-color: #BA7517; color: #fff; }
.filter-btn[data-stance="pro"].active     { background: #639922; border-color: #639922; color: #fff; }

/* ── CONTEXT BLURB ───────────────────────────────────── */
#context-blurb {
  margin: 14px 28px 12px;
  padding: 9px 14px;
  border-left: 3px solid #185FA5;
  background: #f0f7ff;
  border-radius: 0 6px 6px 0;
  font-size: 13px; color: #374151; line-height: 1.55;
}

/* ── MAIN LAYOUT ─────────────────────────────────────── */
#main {
  display: flex; gap: 0;
  padding: 0 28px 52px;
  align-items: flex-start;
}

/* ── CARD LIST ───────────────────────────────────────── */
#card-list {
  width: 340px; flex-shrink: 0;
  display: flex; flex-direction: column; gap: 10px;
}

.scard {
  background: #fff; border: 1px solid #e5e7eb; border-radius: 10px;
  padding: 13px 15px; cursor: pointer;
  transition: border-color 0.13s;
}
.scard:hover         { border-color: #93b8e3; }
.scard.selected      { border-color: #185FA5; box-shadow: 0 0 0 2.5px rgba(24,95,165,0.13); }

.card-r1 { display: flex; align-items: center; gap: 7px; margin-bottom: 8px; }
.sdot    { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.sdot-against { background: #E24B4A; }
.sdot-neutral { background: #BA7517; }
.sdot-pro     { background: #639922; }

.sname { font-size: 13.5px; font-weight: 600; color: #111827; flex: 1; min-width: 0; }

.sbadge {
  flex-shrink: 0; font-size: 11px; font-weight: 600;
  padding: 2px 8px; border-radius: 10px; text-transform: capitalize; letter-spacing: 0.01em;
}
.sbadge-against { background: #FCEBEB; color: #A32D2D; }
.sbadge-neutral { background: #FAEEDA; color: #854F0B; }
.sbadge-pro     { background: #EAF3DE; color: #3B6D11; }

.card-r2 { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
.int-lbl { font-size: 11px; color: #9ca3af; white-space: nowrap; }

.bar-wrap {
  width: 160px; flex-shrink: 0;
  height: 5px; background: #eef0f2; border-radius: 3px; overflow: hidden;
}
.bar-fill { height: 100%; border-radius: 3px; }
.bar-against { background: #E24B4A; }
.bar-neutral { background: #BA7517; }
.bar-pro     { background: #639922; }

.int-score { font-size: 12px; font-weight: 600; color: #374151; white-space: nowrap; }
.card-r3   { font-size: 12px; color: #6b7280; line-height: 1.45; }

/* ── DETAIL PANEL ────────────────────────────────────── */
#detail-panel {
  flex-shrink: 0; width: 0; overflow: hidden;
  transition: width 0.22s cubic-bezier(.4,0,.2,1),
              margin-left 0.22s cubic-bezier(.4,0,.2,1);
  margin-left: 0;
}
#detail-panel.open { width: 320px; margin-left: 16px; overflow-y: auto; }

#detail-inner {
  width: 320px; background: #fff; border: 1px solid #e5e7eb;
  border-radius: 10px; padding: 16px 18px 22px;
}

.dp-hdr { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 14px; }
.dp-title-blk { flex: 1; }
.dp-name { font-size: 15px; font-weight: 700; color: #111827; margin-bottom: 5px; }
.dp-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.dp-score { font-size: 12px; color: #6b7280; font-weight: 500; }
.dp-close {
  flex-shrink: 0; background: none; border: none; cursor: pointer;
  color: #9ca3af; font-size: 21px; line-height: 1; padding: 0; margin-top: -3px;
}
.dp-close:hover { color: #374151; }

.dp-sec { margin-bottom: 13px; }
.dp-sec:last-child { margin-bottom: 0; }
.dp-sec-lbl {
  font-size: 10.5px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.09em; color: #9ca3af;
  padding-bottom: 5px; border-bottom: 1px solid #f0f0f0; margin-bottom: 8px;
}
.dp-sec-body { font-size: 12.5px; color: #374151; line-height: 1.65; }

/* ── OVERVIEW SECTION ────────────────────────────────── */
#overview-section { flex: 1; min-width: 0; display: none; }

.ov-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(252px, 1fr));
  gap: 12px;
}
.ov-card {
  background: #fff; border: 1px solid #e5e7eb;
  border-radius: 10px; padding: 13px 15px;
}
.ov-hdr { display: flex; align-items: center; gap: 7px; margin-bottom: 9px; }
.ov-name { font-size: 13px; font-weight: 600; color: #111827; flex: 1; }
.ov-int-row { display: flex; align-items: center; gap: 8px; margin-bottom: 9px; }
.ov-chips { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 9px; }
.rec-chip {
  font-size: 10.5px; padding: 2px 7px; border-radius: 8px;
  background: #f0f6ff; color: #185FA5; font-weight: 500; border: 1px solid #d1e3f8;
}
.nn-lbl {
  font-size: 10.5px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.08em; color: #9ca3af; margin-bottom: 5px;
}
.nn-list { list-style: none; }
.nn-list li {
  font-size: 12px; color: #374151; padding-left: 13px;
  position: relative; line-height: 1.5; margin-bottom: 2px;
}
.nn-list li::before { content: '—'; position: absolute; left: 0; color: #c4c9d0; }

.empty-msg { padding: 36px 0; text-align: center; color: #9ca3af; font-size: 13px; }
</style>
</head>
<body>

<!-- HEADER -->
<header id="header">
  <div id="header-left">
    <div class="eyebrow">SCISOC 590 Talent &amp; Workforce Team</div>
    <div class="hdr-title">Stakeholder Redteaming Dashboard</div>
    <div class="hdr-sub">Anticipating concerns, grievances, and engagement strategies across policy recommendations</div>
  </div>
  <div class="produced">
    <div class="prod-lbl">Produced by</div>
    <div class="prod-names">Celine Yang &middot; Jon Crucitti &middot; Angie Feng &middot; Victoria Lanier</div>
    <div class="prod-names" style="margin-top:2px;">Visualization by Celine Yang</div>
  </div>
</header>

<!-- TABS -->
<div id="tabs-bar"></div>

<!-- FILTER -->
<div id="filter-bar">
  <span class="filter-label">Stance</span>
  <button class="filter-btn" data-stance="all">All</button>
  <button class="filter-btn" data-stance="against">Against</button>
  <button class="filter-btn" data-stance="neutral">Neutral</button>
  <button class="filter-btn" data-stance="pro">Pro</button>
</div>

<!-- CONTEXT BLURB -->
<div id="context-blurb"></div>

<!-- MAIN -->
<div id="main">
  <div id="card-list"></div>
  <div id="detail-panel"><div id="detail-inner"></div></div>
  <div id="overview-section"></div>
</div>

<script>
/* ── DATA ──────────────────────────────────────────────── */
const recs = [
  { id:'r1', label:'Community upskilling',  context:'Reskilling adults and displaced workers \u2014 particularly in manufacturing and legacy industries \u2014 through accessible, community-based training programs.' },
  { id:'r2', label:'PK\u201313 education',   context:'Integrating AI literacy and responsible AI use into public school curricula, from foundational digital skills to STEM and CTE pathways.' },
  { id:'r3', label:'Credentialling',         context:'Creating state-recognized, stackable micro-credentials for AI-adjacent skills that connect directly to employer demand.' },
  { id:'r4', label:'Pipeline to workforce',  context:'Building structured, equitable pathways from education institutions \u2014 including HBCUs and community colleges \u2014 into AI-sector employment.' },
  { id:'r5', label:'UE & reemployment',      context:'Reforming unemployment insurance and reemployment services to support workers displaced by AI-driven automation.' },
];

const stakeholders = {
  r1:[
    { name:'Manufacturing workers & legacy industry', stance:'against', intensity:92,
      oneliner:'453K NC manufacturing workers face acute automation exposure with capital constraints that block retraining.',
      cares:'Workforce stability, operational predictability, and retraining pathways that do not require income disruption.',
      grievance:'The Piedmont Triad alone has 49.2% high-AI-exposure occupations (Brookings). NC manufacturing workers and the $111.1B agriculture sector face disproportionate displacement with employers citing capital constraints as the key barrier to retraining investment. Existing upskilling programs are rarely designed around shift-work schedules or the specific skill gaps between legacy roles and AI-adjacent ones.',
      engage:'Develop sector-based workforce compacts modeled on SC\'s Apprenticeship Carolina program: OJT + community college instruction + per-apprentice state tax credits on a sliding scale by firm size. Target NCCCS delivery hubs in the Piedmont Triad and rural east. Co-design short-term stackable credentials with legacy employers to match actual skill gaps.' },
    { name:'Prime working-age adults (25\u201354)', stance:'against', intensity:82,
      oneliner:'61% of NC tech jobs face disruption; retraining is inaccessible while income is needed to survive.',
      cares:'Job security, retraining access without income disruption, portable credentials, childcare support during retraining, wage stability.',
      grievance:'A January 2026 NC Dept. of Commerce report confirms AI adoption in manufacturing (<10%) and information (30%) sectors is low but accelerating \u2014 displacement risk is imminent. Workers cannot pause income to retrain and fear short-term credentials will not lead to quality employment. Childcare and transportation barriers compound access problems for this cohort.',
      engage:'Deploy sector-based reskilling grants through county workforce boards. Incentivize employer co-investment in AI upskilling. Deliver flexible hybrid training. Host AI impact briefings through county workforce development boards. Create rapid-response retraining funds for high-displacement-risk counties.' },
    { name:'WinstonNet & digital equity orgs', stance:'neutral', intensity:74,
      oneliner:'WinstonNet has already built a working model \u2014 free AI curriculum through 25+ community tech centers \u2014 that the state has not yet funded to scale.',
      cares:'Device access, reliable broadband at home, sustained multi-year funding, and replication of proven community-tech-center models in underserved regions.',
      grievance:'Community organizations flag that short-term grant cycles consistently disappear before programs build real community uptake. WinstonNet delivers a free 30-hour AI curriculum from basic computer skills through AI via neighborhood tech centers, but this model has not been funded for replication in the Piedmont Triad, eastern NC, or western mountain communities where infrastructure gaps are worst.',
      engage:'Fund WinstonNet as a formal state AI delivery partner. Replicate the community tech center model in high-gap regions. Coordinate expansion with the state broadband rollout timeline so connectivity and training arrive together. Fund wraparound services \u2014 childcare, transportation, language access \u2014 as standard line items, not optional add-ons.' },
    { name:'El Centro Hispano & immigrant-serving orgs', stance:'neutral', intensity:70,
      oneliner:'Most AI programs are designed for English speakers and translated as an afterthought; documentation requirements exclude a large share of NC\'s low-wage workforce.',
      cares:'Language-accessible training, removal of documentation barriers from intake, and culturally responsive outreach through trusted community intermediaries.',
      grievance:'El Centro Hispano (serving Durham\'s Hispanic community since 1992) and similar organizations flag that distrust of government-affiliated institutions limits participation even when programs are technically available. Documentation status creates a hard eligibility wall for a large portion of NC\'s low-wage workforce \u2014 concentrated in agriculture and food processing \u2014 who face some of the highest automation exposure.',
      engage:'Bring El Centro Hispano in as a co-designer before implementation frameworks are written, not after. Route outreach through trusted community intermediaries. Budget language-access services as a standard line item. Remove documentation requirements from intake processes where legally permissible.' },
    { name:'NC Rural Center', stance:'neutral', intensity:65,
      oneliner:'Broadband remains the baseline problem: most rural workforce programs collapse once grant funding ends.',
      cares:'Geographic equity in AI investment, broadband as a prerequisite for training access, and sustainable long-term funding for rural workforce programs.',
      grievance:'The NC Rural Center funds workforce development across counties where no other infrastructure exists and consistently flags that AI investments concentrate in metro areas while rural counties fall further behind. Counties with less than 50% broadband coverage cannot support online training, and most rural workforce programs collapse when grant cycles end without sustainable follow-on funding.',
      engage:'Fund AI training hubs inside rural libraries and cooperative extensions. Tie AI program rollout explicitly to the NC broadband expansion timeline. Give the NC Rural Center a formal seat in state AI workforce advisory bodies. Mandate geographic distribution requirements in all program funding criteria.' },
    { name:'Small businesses', stance:'neutral', intensity:60,
      oneliner:'NC\'s 1.1M small businesses employ 44.2% of the private-sector workforce but cannot absorb AI adoption risk.',
      cares:'Capital constraints, certainty of returns before investing, competitive pressure from larger firms, and affordable AI adoption tools.',
      grievance:'Small businesses \u2014 99.6% of all NC businesses, employing 1.7M people \u2014 face tighter margins than large employers, making AI upskilling a high-risk decision (Gov. Stein 2025 Small Business Week proclamation). They are unlikely to invest unless returns are certain or competitive pressure forces action, yet are least equipped to navigate complex state program requirements.',
      engage:'Offer cost-sharing and subsidized AI adoption programs through NC SBTDC and community colleges. Implement sliding-scale training reimbursements by firm size, modeled on SC\'s OJT program. Engage through small business associations with targeted, low-barrier AI resources. Create tiered participation requirements scaled to firm size.' },
    { name:'Legacy agriculture', stance:'neutral', intensity:58,
      oneliner:'NC\'s $111.1B agricultural sector faces dual pressure: automation exposure and persistent domestic labor shortage.',
      cares:'Workforce continuity, operational predictability, AI tools that augment rather than displace, and rural digital infrastructure.',
      grievance:'NC agriculture employs 14,000\u201317,000 H-2A guest workers annually and is concentrated in rural eastern NC where digital infrastructure is weakest. The sector faces both automation exposure and a domestic labor shortage \u2014 capital constraints and limited rural broadband compound barriers to adopting even beneficial AI tools like precision agriculture and crop monitoring.',
      engage:'Focus on AI tools that augment rather than displace: precision agriculture, crop monitoring, smart irrigation. Engage through NC State Extension digital skills agents in rural counties. Address broadband as a prerequisite, not an afterthought, for any agricultural AI program.' },
    { name:'NCWorks / NC Dept. of Commerce', stance:'neutral', intensity:45,
      oneliner:'WIOA funding formulas reward rapid job placement over the deeper reskilling AI-adjacent roles require.',
      cares:'Labor market outcomes, WIOA compliance, reducing structural unemployment, equity across rural and minority communities.',
      grievance:'Commerce administers WIOA funds but faces a structural tension: funding formulas incentivize rapid job placement at odds with deeper AI reskilling. NCWorks Career Centers lack AI-specific navigation tools and staff capacity. Separate case management systems across DPI, NCCCS, the UNC System, and Commerce create fragmentation the 2024\u20132027 WIOA State Plan commits to fixing but has not yet resolved.',
      engage:'Task NCWorks Commission with developing an AI Workforce Transition Framework using real-time labor market data. Expand NC Workforce Credentials with a dedicated AI/automation track. Formalize data-sharing MOUs between Commerce, NCCCS, and the UNC System. Pilot co-location of NCWorks advisors on community college campuses in high-displacement counties.' },
  ],
  r2:[
    { name:'K-12 educators & administrators', stance:'against', intensity:88,
      oneliner:'Implementation is required but training is absent: it takes 10+ hours to prepare a teacher, yet digital learning coordinator positions are being cut statewide.',
      cares:'Professional development infrastructure, manageable workload, autonomy in implementation, and adequate resources before mandates.',
      grievance:'NC was the 4th state to issue K-12 AI guidance (2024), but application remains uneven two years later. Many teachers still prohibit AI use in class. At least 10 initial training hours are needed per teacher to teach AI effectively \u2014 yet the number of staff qualified to train teachers is actively shrinking statewide. Rural districts face compounding barriers: broadband, aging devices, and teacher shortages. A 2025 Gallup survey found students in rural and lower-income counties are least likely to have schools with AI rules or access.',
      engage:'Rebuild professional development infrastructure before mandating student-facing rollout. Fund bottom-up faculty AI integration grants at the department level. Pilot NCDPI digital learning coaches in rural Tier 1 and 2 districts. Facilitate teacher-led AI task forces rather than top-down mandates.' },
    { name:'Families of K\u201312 students', stance:'neutral', intensity:80,
      oneliner:'Data privacy gaps, equity divides, and AI-linked mental health concerns are outpacing parent awareness and institutional guidance.',
      cares:'Child safety, data privacy, foundational learning, transparency about AI in schools, and equal access across income levels.',
      grievance:'NC\'s FERPA framework predates AI-era data processing, leaving governance gaps NCDPI has not formally closed. 72% of teens now regularly use AI companion tools, and a 2025 legal analysis found parents nationwide have filed lawsuits alleging AI chatbots contributed to teenage mental health crises. Higher-income families can supplement school AI exposure at home, compounding existing disadvantages for lower-income students.',
      engage:'Deliver family AI literacy through community intermediaries, not just school communications. Differentiate by age: digital safety for K\u20138, AI ethics and career relevance for high school. Provide counselor training on AI-related student wellbeing concerns. Default to opt-in rather than opt-out data policies for minors.' },
    { name:'At-risk & dropout-risk students', stance:'against', intensity:78,
      oneliner:'NC loses ~9,500 students at grades 9\u201310 annually \u2014 disproportionately Hispanic and American Indian males \u2014 who face the highest automation exposure with the least future access to reskilling.',
      cares:'Immediate structural barriers (poverty, instability) take precedence over AI literacy, yet long-term automation exposure is highest for this group.',
      grievance:'Students at risk of dropping out \u2014 concentrated at grades 9 and 10, disproportionately Hispanic and American Indian males in rural and high-poverty districts \u2014 are rarely reached by AI literacy programs. Yet these students face the highest long-term automation exposure and least access to reskilling pathways later. Treating AI literacy as a standalone course misses the reality of their situation entirely.',
      engage:'Embed AI literacy in wraparound support programs, not standalone AI courses. Design AI content relevant to trades and service careers, not only white-collar pathways. Engage through trusted community intermediaries already working with this population. Address structural barriers \u2014 food security, housing stability \u2014 as prerequisites to program participation.' },
    { name:'Middle-grade students (4\u20139)', stance:'neutral', intensity:65,
      oneliner:'NC\'s AI Solve-a-Thon shows students are already building AI tools \u2014 the policy debate needs to shift from whether to introduce AI to how to guide its use.',
      cares:'Consistent AI access across rural and urban schools, grade-appropriate guidance, and equity in readiness between high-resource and low-resource districts.',
      grievance:'Urban and suburban students have significantly greater AI access than rural peers. The NC AI Solve-a-Thon proved middle-grade students are already building with AI \u2014 readiness is outpacing policy. Yet a 2025 Gallup survey found rural and low-income students are least likely to have schools that allow AI use or have established rules, creating a widening equity gap within this cohort.',
      engage:'Apply NCDPI grade-span recommendations actively rather than leaving implementation to district discretion. Embed AI literacy across subjects, not as a standalone module. Address the access gap between rural and urban districts through targeted device and broadband investment before expanding AI curriculum requirements.' },
    { name:'Rural school districts', stance:'neutral', intensity:62,
      oneliner:'AI readiness is increasingly determined by zip code \u2014 broadband and resource gaps across NC\'s 100 counties are widening the equity gap.',
      cares:'Device access, broadband infrastructure, teacher capacity, and equitable funding relative to urban districts.',
      grievance:'NCDIT\'s 2022 broadband report identified rural counties with inconsistent high-speed access that cannot support AI-enabled instruction. Rural districts face compounding gaps: fewer devices, aging infrastructure, teacher shortages, and limited professional development access compared to urban systems. State guidance is progressive, but uneven implementation means students\' AI readiness tracks their zip code.',
      engage:'Link broadband investment to AI education rollout \u2014 treat them as one policy domain. Mandate geographic distribution requirements in all AI program funding. Ensure rural counties receive device and infrastructure prioritization before curriculum expansion. Pilot NCDPI digital learning coaches specifically in Tier 1 and 2 rural districts.' },
    { name:'EdTech vendors', stance:'pro', intensity:32,
      oneliner:'Vendors see a large public procurement opportunity but want faster, clearer procurement standards and a vendor certification framework.',
      cares:'Market access, procurement speed, regulatory clarity, and a state certification framework to reduce uncertainty.',
      grievance:'Slow and opaque procurement cycles and unclear technical standards create costly market uncertainty. Absence of a certification framework makes it difficult for districts to assess products and for vendors to demonstrate compliance with state standards.',
      engage:'Establish a vendor certification framework with clear, transparent criteria. Streamline procurement for pre-approved products. Use NC A&T\'s NVIDIA collaboration and the UNC System\'s Foundational AI Skills Course as models for scalable public-private curriculum partnerships.' },
  ],
  r3:[
    { name:'4-year universities & UNC system', stance:'against', intensity:78,
      oneliner:'State-backed credentials compete with degree programs without equivalent rigor \u2014 threatening enrollment revenue and degree value.',
      cares:'Institutional prestige, tuition revenue, accreditation standing, and maintaining the long-term value of 4-year degrees.',
      grievance:'UNC system administrators and private college leaders worry state micro-credentials compete directly with degree programs without equivalent rigor or oversight. HB 1004\'s $16M AI Hub investment concentrated in UNC campuses positions four-year institutions as the center of gravity \u2014 but micro-credentialing policy could undercut the very pipeline these hubs are meant to strengthen.',
      engage:'Involve universities in credential design committees from the start. Create articulation agreements so credentials stack toward existing degree pathways. Use HB 1004\'s AI Hub framework as a model for collaborative, not competitive, AI investment. Co-produce annual AI talent gap reports with institutional research offices.' },
    { name:'CTE & trades students (10\u201312)', stance:'neutral', intensity:72,
      oneliner:'AI is elevating trades, not replacing them \u2014 CTE students need trade-specific AI fluency, but credentials frameworks have not yet caught up.',
      cares:'Credentials that reflect real AI integration in trades (HVAC, construction, automotive, healthcare tech), not generic digital skills.',
      grievance:'Wake Technical Community College\'s AI-integrated simulation labs \u2014 where students interact with virtual patients and smart-grid systems \u2014 show that AI is already reshaping how core trade skills are applied. But statewide credential frameworks have not caught up to this reality. CTE students need credentials that certify trade-specific AI fluency, not only white-collar AI literacy.',
      engage:'Integrate AI tools into CTE curricula via industry partnerships. Expand Wake Tech-style AI simulation labs statewide. Align credential content with employer expectations in construction, advanced manufacturing, automotive, and healthcare technology. Ensure credentialling frameworks include trade-specific AI competency tracks.' },
    { name:'Displaced workers & low-income job seekers', stance:'neutral', intensity:70,
      oneliner:'Skeptical that credentials translate to real employer recognition \u2014 the time and cost investment is too high to risk without proof.',
      cares:'Actual employment outcomes, affordability of training, employer recognition of certifications, and transparent outcome data.',
      grievance:'Workers with no financial cushion cannot invest time and money in credentials that prior programs failed to get employers to recognize widely enough. Community college students and career-changers need assurance that credentials map to real, available jobs \u2014 not theoretical demand. Without bridge financing, people who could successfully transition will drop out before they finish.',
      engage:'Require signed employer commitment letters before certifying any new credential. Publish outcome data \u2014 wages, placement rates \u2014 transparently through NC Careers. Expand NC Workforce Credentials with a dedicated AI/automation track via the NC Short-Term Workforce Development Grant Program. Direct CDFI lending toward training organizations serving high-displacement industries.' },
    { name:'NC Community College System (NCCCS)', stance:'pro', intensity:52,
      oneliner:'Community colleges are the frontline credential providers but need multi-year funding to plan and deliver at scale.',
      cares:'Institutional funding stability, enrollment growth, mission alignment, and sustainable revenue beyond one-time grants.',
      grievance:'One-time grant structures create program dependency without sustainable revenue streams. Community college leaders prioritize credentials connecting directly to employment outcomes \u2014 especially for displaced workers \u2014 but the $1.3M digital navigator grant placing navigators at 20 community colleges, while a real step, illustrates the funding scale problem: pilot programs that cannot scale.',
      engage:'Build multi-year appropriations into credential program design. Involve NCCCS as a co-designer alongside Commerce and the UNC System. Formalize data-sharing MOUs to create accountability infrastructure. Co-locate NCWorks advisors on community college campuses in high-displacement counties. Expand the digital navigator model with sustained, not one-time, funding.' },
    { name:'Large employers & tech sector', stance:'pro', intensity:40,

/* ── STATE ─────────────────────────────────────────────── */
let activeTab    = 'r1';
let activeFilter = 'all';
let selected     = null;

/* ── HELPERS ───────────────────────────────────────────── */
function getNonneg(s) {
  return s.cares
    .replace(/\.$/, '')
    .replace(/ and /gi, ', ')
    .split(',')
    .map(x => x.trim())
    .filter(x => x.length > 4)
    .slice(0, 3);
}

function recLabel(id) {
  const r = recs.find(r => r.id === id);
  return r ? r.label : id;
}

function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

/* ── TABS ───────────────────────────────────────────────── */
function renderTabs() {
  const bar = document.getElementById('tabs-bar');
  bar.innerHTML = '';
  [...recs, { id:'overview', label:'Stakeholder overview' }].forEach(r => {
    const btn = document.createElement('button');
    btn.className = 'tab-pill' + (activeTab === r.id ? ' active' : '');
    btn.textContent = r.label;
    btn.onclick = () => { activeTab = r.id; selected = null; render(); };
    bar.appendChild(btn);
  });
}

/* ── FILTER ─────────────────────────────────────────────── */
function renderFilter() {
  const bar = document.getElementById('filter-bar');
  bar.style.display = activeTab === 'overview' ? 'none' : 'flex';
  bar.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.stance === activeFilter);
    btn.onclick = () => { activeFilter = btn.dataset.stance; selected = null; render(); };
  });
}

/* ── CONTEXT BLURB ──────────────────────────────────────── */
function renderContext() {
  const el = document.getElementById('context-blurb');
  if (activeTab === 'overview') { el.style.display = 'none'; return; }
  el.style.display = '';
  const rec = recs.find(r => r.id === activeTab);
  el.textContent = rec ? rec.context : '';
}

/* ── CARDS ──────────────────────────────────────────────── */
function renderCards() {
  const list   = document.getElementById('card-list');
  const panel  = document.getElementById('detail-panel');
  const ovSec  = document.getElementById('overview-section');

  if (activeTab === 'overview') {
    list.style.display  = 'none';
    panel.style.display = 'none';
    ovSec.style.display = 'block';
    renderOverview();
    return;
  }

  list.style.display  = 'flex';
  panel.style.display = '';
  ovSec.style.display = 'none';

  const items = (stakeholders[activeTab] || [])
    .filter(s => activeFilter === 'all' || s.stance === activeFilter)
    .sort((a, b) => b.intensity - a.intensity);

  list.innerHTML = '';
  if (!items.length) {
    list.innerHTML = '<div class="empty-msg">No stakeholders match this filter.</div>';
    return;
  }

  items.forEach(s => {
    const card = document.createElement('div');
    card.className = 'scard' + (selected?.name === s.name ? ' selected' : '');
    card.innerHTML = `
      <div class="card-r1">
        <span class="sdot sdot-${s.stance}"></span>
        <span class="sname">${esc(s.name)}</span>
        <span class="sbadge sbadge-${s.stance}">${s.stance}</span>
      </div>
      <div class="card-r2">
        <span class="int-lbl">Intensity</span>
        <div class="bar-wrap"><div class="bar-fill bar-${s.stance}" style="width:${s.intensity}%"></div></div>
        <span class="int-score">${s.intensity}/100</span>
      </div>
      <div class="card-r3">${esc(s.oneliner)}</div>`;
    card.onclick = () => { selected = s; render(); };
    list.appendChild(card);
  });
}

/* ── DETAIL PANEL ───────────────────────────────────────── */
function renderDetail() {
  const panel = document.getElementById('detail-panel');
  const inner = document.getElementById('detail-inner');

  if (!selected || activeTab === 'overview') {
    panel.classList.remove('open');
    return;
  }

  panel.classList.add('open');

  requestAnimationFrame(() => {
    const cardEls = document.querySelectorAll('.scard');
    const card = Array.from(cardEls).find(el => el.querySelector('.sname')?.textContent === selected?.name);
    if (!card) return;

    const cardRect   = card.getBoundingClientRect();
    const panelRect  = panel.getBoundingClientRect();
    const panelHeight   = panel.offsetHeight;
    const viewportHeight = window.innerHeight;

    // How far down would the panel need to scroll to align its top with the card's top
    const desiredOffset    = cardRect.top - panelRect.top;
    const desiredScrollTop = Math.max(0, panel.scrollTop + desiredOffset);

    // Check if aligning to card top would cause the panel bottom to exceed the viewport
    const panelTopIfAligned    = panelRect.top + desiredOffset;
    const panelBottomIfAligned = panelTopIfAligned + panelHeight;

    if (panelBottomIfAligned > viewportHeight) {
      // Align panel bottom to viewport bottom instead
      const bottomAlignedScroll = panel.scrollTop + (viewportHeight - panelRect.bottom);
      panel.scrollTop = Math.max(0, panel.scrollTop + bottomAlignedScroll);
    } else {
      panel.scrollTop = desiredScrollTop;
    }
  });

  const s = selected;
  inner.innerHTML = `
    <div class="dp-hdr">
      <div class="dp-title-blk">
        <div class="dp-name">${esc(s.name)}</div>
        <div class="dp-meta">
          <span class="sbadge sbadge-${s.stance}">${s.stance}</span>
          <span class="dp-score">Intensity&nbsp;${s.intensity}/100</span>
        </div>
      </div>
      <button class="dp-close" id="dp-close-btn">&times;</button>
    </div>
    <div class="dp-sec">
      <div class="dp-sec-lbl">What they care about</div>
      <div class="dp-sec-body">${esc(s.cares)}</div>
    </div>
    <div class="dp-sec">
      <div class="dp-sec-lbl">Their grievance</div>
      <div class="dp-sec-body">${esc(s.grievance)}</div>
    </div>
    <div class="dp-sec">
      <div class="dp-sec-lbl">How to engage</div>
      <div class="dp-sec-body">${esc(s.engage)}</div>
    </div>`;

  document.getElementById('dp-close-btn').onclick = () => { selected = null; render(); };
}

/* ── OVERVIEW ───────────────────────────────────────────── */
function renderOverview() {
  const el  = document.getElementById('overview-section');
  const all = [];
  Object.entries(stakeholders).forEach(([recId, list]) => {
    list.forEach(s => all.push({ ...s, recId }));
  });
  const stanceOrder = { against: 0, neutral: 1, pro: 2 };
  all.sort((a, b) => {
    if (stanceOrder[a.stance] !== stanceOrder[b.stance]) return stanceOrder[a.stance] - stanceOrder[b.stance];
    return b.intensity - a.intensity;
  });

  el.innerHTML = '<div class="ov-grid">' + all.map(s => {
    const nn = getNonneg(s);
    return `
      <div class="ov-card">
        <div class="ov-hdr">
          <span class="sdot sdot-${s.stance}"></span>
          <span class="ov-name">${esc(s.name)}</span>
          <span class="sbadge sbadge-${s.stance}">${s.stance}</span>
        </div>
        <div class="ov-int-row">
          <div class="bar-wrap"><div class="bar-fill bar-${s.stance}" style="width:${s.intensity}%"></div></div>
          <span class="int-score">${s.intensity}/100</span>
        </div>
        <div class="ov-chips">
          <span class="rec-chip">${esc(recLabel(s.recId))}</span>
        </div>
        <div class="nn-lbl">Non-negotiables</div>
        <ul class="nn-list">${nn.map(n => `<li>${esc(n)}</li>`).join('')}</ul>
      </div>`;
  }).join('') + '</div>';
}

/* ── RENDER ALL ─────────────────────────────────────────── */
function render() {
  renderTabs();
  renderFilter();
  renderContext();
  renderCards();
  renderDetail();
}

render();
</script>
